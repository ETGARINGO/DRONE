<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO9 Tactical Map: ZAMPEN Sector</title>
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --pnp-blue: #1a237e;
            --accent-green: #00e676;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }

        /* 1. ATMOSPHERIC OVERLAY */
        #blend-overlay {
            position: absolute;
            inset: 0;
            background-image: url('BLEND.png');
            background-size: cover;
            background-position: center;
            mix-blend-mode: screen;
            z-index: 5;
            pointer-events: none;
            opacity: 0;
            animation: lightningPulse 1.2s ease-out forwards;
        }

        /* 2. TACTICAL MARKER (SULU START POINT) */
        #tactical-marker {
            position: absolute;
            z-index: 10;
            width: 60px;
            height: 60px;
            background-image: url('PIN LOGO.png');
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            filter: drop-shadow(0 0 15px var(--accent-green));
            opacity: 0;
            /* Positioning relative to Sulu in a typical ZAMPEN map layout */
            bottom: 20%; 
            left: 20%;
            animation: suluLock 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* 3. MAP CONTAINER (ZOOMING FROM SULU TO ZAMPEN) */
        .map-frame-container {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
            /* Origin set to bottom-left to simulate starting at Sulu */
            transform-origin: 20% 80%; 
            transform: scale(12);
            filter: brightness(0) blur(10px);
            animation: regionalZoomOut 4s cubic-bezier(0.16, 1, 0.3, 1) 0.5s forwards;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #020b16;
        }

        /* 4. HUD ELEMENTS */
        .hud-scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(0, 212, 255, 0.3);
            z-index: 6;
            top: 0;
            box-shadow: 0 0 10px var(--tactical-blue);
            animation: scanning 4s linear infinite;
        }

        /* ANIMATION SEQUENCES */

        @keyframes lightningPulse {
            0% { opacity: 0; background-color: #fff; }
            10% { opacity: 1; background-color: transparent; }
            20% { opacity: 0.2; }
            30% { opacity: 0.6; }
            100% { opacity: 0.3; }
        }

        @keyframes suluLock {
            0% { opacity: 0; transform: scale(5); }
            40% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(0.2); }
        }

        @keyframes regionalZoomOut {
            0% {
                transform: scale(12);
                filter: brightness(0.1) blur(15px);
            }
            20% {
                filter: brightness(0.4) blur(8px);
            }
            100% {
                transform: scale(1);
                filter: brightness(1) blur(0px);
            }
        }

        @keyframes scanning {
            0% { top: 0%; }
            100% { top: 100%; }
        }

        /* COORDINATE BOX */
        .coords {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            color: var(--accent-green);
            font-size: 12px;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-left: 2px solid var(--accent-green);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="hud-scanline"></div>
    <div id="blend-overlay"></div>
    <div id="tactical-marker"></div>
    
    <div class="coords">
        UPLINK: ACTIVE<br>
        SECTOR: RPRMD-PRO9<br>
        LOC: 6.0483° N, 121.0024° E
    </div>

    <div class="map-frame-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec"
            title="PRO9 Tactical System"
            allow="autoplay; geolocation">
        </iframe>
    </div>

</body>
</html>
