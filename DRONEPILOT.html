<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | TACTICAL ZAMPEN DEPLOYMENT</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', monospace;
        }

        /* Tactical Map Filter */
        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: brightness(0.5) contrast(1.2) saturate(0.5) hue-rotate(180deg);
            background: var(--bg-black);
        }

        /* 1. Atmospheric Blend Overlay */
        #blend-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 20%, rgba(0, 5, 10, 0.8) 100%);
            z-index: 5; pointer-events: none;
        }

        /* 2. Central Tactical Marker (Sulu Lock-on) */
        #tactical-marker {
            position: absolute; top: 50%; left: 50%;
            margin-left: -40px; margin-top: -40px;
            z-index: 10; width: 80px; height: 80px;
            background: url('PIN LOGO.png') no-repeat center/contain;
            filter: drop-shadow(0 0 15px var(--accent-green));
            pointer-events: none;
            opacity: 0;
            animation: markerImpact 1.5s cubic-bezier(0.19, 1, 0.22, 1) forwards;
        }

        /* 3. Secure Data Frame (Hidden until Zoom finishes) */
        #secure-frame {
            position: absolute; width: 100%; height: 100%; border: none;
            z-index: 100; opacity: 0; display: none;
            transition: opacity 1s ease-in;
        }

        /* Animations */
        @keyframes markerImpact {
            0% { opacity: 0; transform: scale(10); filter: brightness(5); }
            50% { opacity: 1; transform: scale(1); filter: brightness(1); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        .tactical-label {
            background: rgba(0, 212, 255, 0.1) !important;
            border: 1px solid var(--tactical-blue) !important;
            color: var(--tactical-blue) !important;
            font-weight: bold; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="map"></div>
    <div id="blend-overlay"></div>
    <div id="tactical-marker"></div>

    <iframe id="secure-frame" 
            src="https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec" 
            allow="geolocation">
    </iframe>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // COORDINATES: [Lat, Long]
        const SULU = [6.0, 121.0];
        const ZAMPEN_CENTER = [7.8, 123.0]; // Centered view of Zamboanga Peninsula

        // Initialize Map locked on SULU (High Zoom)
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView(SULU, 12);

        // Dark Satellite Imagery
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        async function startTacticalSequence() {
            const frame = document.getElementById('secure-frame');

            // Wait for Marker Impact, then Start Pullback
            setTimeout(() => {
                // Fly from Sulu to Overall ZAMPEN
                map.flyTo(ZAMPEN_CENTER, 8, {
                    animate: true,
                    duration: 4, // Smooth long transition
                    easeLinearity: 0.1
                });
                
                // Add Tactical Nodes during flight
                addRegionalNodes();
            }, 1200);

            // Final Phase: Reveal Secure Data Frame
            setTimeout(() => {
                frame.style.display = "block";
                setTimeout(() => { frame.style.opacity = "1"; }, 100);
            }, 5500);
        }

        function addRegionalNodes() {
            const provinces = [
                { name: "Sulu Node", pos: [6.0, 121.0] },
                { name: "Zamboanga City", pos: [6.92, 122.07] },
                { name: "Zamboanga Sibugay", pos: [7.7, 122.5] },
                { name: "Zamboanga del Sur", pos: [7.8, 123.3] },
                { name: "Zamboanga del Norte", pos: [8.2, 123.0] }
            ];

            provinces.forEach((p, i) => {
                setTimeout(() => {
                    L.circleMarker(p.pos, {
                        radius: 5, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.8
                    }).addTo(map).bindTooltip(p.name, {
                        permanent: true, direction: 'top', className: 'tactical-label'
                    });
                }, i * 400 + 1500); // Nodes pop up as we zoom out
            });
        }

        // Start when page loads
        window.onload = startTacticalSequence;
    </script>
</body>
</html>
