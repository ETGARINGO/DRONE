<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | TACTICAL SATELLITE RECON</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --siren-red: rgba(255, 0, 0, 0.4);
            --bg-black: #00050a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', Courier, monospace;
        }

        /* EMERGENCY SIREN OVERLAY */
        #siren-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50; pointer-events: none;
            opacity: 0;
        }

        .siren-active {
            animation: flushSiren 0.8s infinite;
        }

        @keyframes flushSiren {
            0%, 100% { background-color: transparent; box-shadow: inset 0 0 0px transparent; }
            50% { background-color: var(--siren-red); box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.6); }
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: brightness(0.5) contrast(1.2) saturate(0.2) hue-rotate(180deg);
        }

        #reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border: 2px solid var(--accent-green);
            border-radius: 50%;
            z-index: 60; pointer-events: none;
            opacity: 0;
            animation: pulseReticle 1s infinite ease-in-out;
        }

        @keyframes pulseReticle {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
        }

        #form-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; opacity: 0;
            background-color: #000;
            transition: opacity 1s ease-in-out;
        }

        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 105;
        }

        #hud-data {
            position: absolute; top: 20px; left: 20px; z-index: 70;
            color: var(--accent-green); font-size: 12px;
            pointer-events: none; text-shadow: 0 0 5px #000;
        }

        .tactical-label {
            background: rgba(0,0,0,0.8) !important; border: 1px solid var(--accent-green) !important;
            color: var(--accent-green) !important; font-size: 10px !important;
            padding: 2px 8px !important; border-radius: 0px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="siren-overlay"></div>
    <div id="map"></div>
    <div id="reticle"></div>
    
    <div id="hud-data">
        STATUS: <span id="status-text">INITIALIZING...</span><br>
        COORD: <span id="current-coord">0.0000, 0.0000</span><br>
        MODE: TACTICAL_RECON_RECOVERY
    </div>

    <div id="form-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const scanPoints = [
            {n: "SULU", p: [6.0, 121.0], z: 12},
            {n: "ISABELA CITY", p: [6.70, 121.97], z: 12},
            {n: "ZAMBOANGA CITY", p: [6.92, 122.07], z: 12},
            {n: "ZAMBOANGA SIBUGAY", p: [7.78, 122.58], z: 10},
            {n: "ZAMBOANGA DEL NORTE", p: [8.15, 123.00], z: 10},
            {n: "ZAMBOANGA DEL SUR", p: [7.90, 123.40], z: 10},
            {n: "REGIONAL_COVERAGE", p: [7.7, 122.8], z: 8}
        ];

        // LOGO CONFIGURATION
        const pinLogo = L.icon({
            iconUrl: 'PIN LOGO.png',
            iconSize: [40, 40], // Adjust size as needed
            iconAnchor: [20, 20],
            popupAnchor: [0, -20]
        });

        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(scanPoints[0].p, 8);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const hudCoord = document.getElementById('current-coord');
        const statusText = document.getElementById('status-text');
        const reticle = document.getElementById('reticle');
        const siren = document.getElementById('siren-overlay');

        async function startTacticalScan() {
            reticle.style.opacity = "1";
            siren.classList.add('siren-active'); // Start the siren effect
            
            for (let i = 0; i < scanPoints.length; i++) {
                const point = scanPoints[i];
                statusText.innerText = `RECON_TARGET: ${point.n}`;
                hudCoord.innerText = `${point.p[0].toFixed(4)}N, ${point.p[1].toFixed(4)}E`;
                
                map.flyTo(point.p, point.z, { duration: 1.5, easeLinearity: 0.25 });

                // Place PIN LOGO.png marker
                L.marker(point.p, { icon: pinLogo }).addTo(map)
                    .bindTooltip(point.n, { permanent: true, direction: 'top', className: 'tactical-label' });

                await new Promise(r => setTimeout(r, 2000));
            }

            siren.classList.remove('siren-active'); // Stop siren on link
            transitionToInterface();
        }

        function transitionToInterface() {
            const container = document.getElementById('form-container');
            statusText.innerText = "UPLINK_STABLE";
            container.style.display = "block";
            setTimeout(() => { 
                container.style.opacity = "1";
                reticle.style.opacity = "0";
            }, 50);
        }

        window.onload = startTacticalScan;
    </script>
</body>
</html>
