<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | DRONEPILOT COMMAND</title>
    
    <link rel="icon" type="image/png" href="PIN LOGO.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
            --warning-red: rgba(255, 51, 51, 0.8);
            --glass: rgba(0, 20, 40, 0.7);
            --ui-glow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-green);
        }

        /* SCANLINE CRT EFFECT */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 3000; opacity: 0.3;
        }

        #tactical-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, var(--bg-black), transparent);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex; align-items: center; padding: 0 30px;
            z-index: 1100; box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        #header-logo { height: 38px; margin-right: 15px; filter: drop-shadow(0 0 8px var(--tactical-blue)); }
        #header-title { font-weight: bold; letter-spacing: 4px; font-size: 14px; color: #fff; text-shadow: 0 0 10px var(--tactical-blue); }

        #siren-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 400; pointer-events: none; opacity: 0;
        }
        .siren-active { animation: sirenFlush 0.8s infinite alternate; }
        @keyframes sirenFlush {
            from { opacity: 0; }
            to { opacity: 1; background: radial-gradient(circle, transparent 30%, var(--warning-red) 100%); }
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.5) contrast(1.2) saturate(0.2) hue-rotate(170deg);
            transition: filter 3s ease-in-out;
        }

        #reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 50%; z-index: 60;
            pointer-events: none; opacity: 0;
            transition: opacity 1s ease;
        }
        #reticle::before { content: ""; position: absolute; width: 140%; height: 1px; top: 50%; left: -20%; background: linear-gradient(90deg, transparent, var(--accent-green), transparent); }
        #reticle::after { content: ""; position: absolute; width: 1px; height: 140%; left: 50%; top: -20%; background: linear-gradient(180deg, transparent, var(--accent-green), transparent); }

        #hud-data {
            position: absolute; bottom: 20px; right: 20px; z-index: 2500;
            font-size: 11px; text-align: right; line-height: 1.6;
            pointer-events: none; text-shadow: 0 0 5px var(--accent-green);
        }

        #command-interface {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1200; display: none; opacity: 0;
            background-color: var(--bg-black);
            transition: opacity 2s ease-in-out;
        }

        #logo-blend-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.2;
            mix-blend-mode: screen; pointer-events: none;
            animation: pulseBackground 8s infinite alternate ease-in-out;
        }

        .viewport-grid {
            position: absolute; top: 80px; left: 2%; width: 96%; height: 85%;
            display: grid; grid-template-columns: 1fr 1fr; gap: 20px; z-index: 10;
        }

        .pane {
            display: flex; flex-direction: column;
            border: 1px solid rgba(0, 212, 255, 0.3);
            background: var(--glass); border-radius: 4px; overflow: hidden;
        }

        .pane-header {
            background: rgba(0, 212, 255, 0.1); padding: 8px 15px;
            font-size: 10px; letter-spacing: 2px; color: var(--tactical-blue);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex; justify-content: space-between;
        }

        iframe { width: 100%; height: 100%; border: none; background: transparent; }

        @media (max-width: 800px) {
            .viewport-grid { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; top: 70px; height: 88%; }
        }

        .tactical-label {
            background: rgba(0, 10, 20, 0.9) !important; border: 1px solid var(--tactical-blue) !important;
            color: var(--tactical-blue) !important; font-family: monospace !important;
        }

        @keyframes pulseBackground { from { transform: scale(1); opacity: 0.15; } to { transform: scale(1.05); opacity: 0.3; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <header id="tactical-header">
        <img src="PIN LOGO.png" id="header-logo" alt="PRO9">
        <div id="header-title">DRONE_PILOT | MISSION CONTROL</div>
    </header>

    <div id="siren-overlay"></div>
    <div id="map"></div>
    <div id="reticle"></div>
    
    <div id="hud-data">
        <span style="color:rgba(0,255,102,0.5)">// SATELLITE_UPLINK_v4.0 //</span><br>
        STATUS: <span id="status-text" style="color:#fff">BOOTING...</span><br>
        TARGET: <span id="current-coord" style="color:#fff">---</span><br>
        ALARM: <span id="alert-status" style="color:#fff">IDLE</span>
    </div>

    <div id="command-interface">
        <img src="BLEND.png" id="logo-blend-bg" alt="Background">
        
        <div class="viewport-grid">
            <div class="pane">
                <div class="pane-header">
                    <span>> SECURE_DATA_INPUT</span>
                    <span style="color: var(--accent-green);">ONLINE</span>
                </div>
                <iframe id="order-frame" src="about:blank"></iframe>
            </div>

            <div class="pane">
                <div class="pane-header">
                    <span>> CLOUD_ARCHIVE_SULU</span>
                    <span style="color: var(--accent-green);">SYNCED</span>
                </div>
                <iframe id="folder-frame" src="about:blank"></iframe>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // CONFIGURATION
        const GOOGLE_UPLINK = "https://script.google.com/macros/s/AKfycbx0IUHNG3c4wIKqiluVJ_bDa9XMQ5UaAA7jYLaMQgfezWnZ6E4AbDrmGgumqd238zHN/exec";
        
        // FIXED: Using the embeddedfolderview format to prevent the 403 error seen in image_e799f2.png
        const DRIVE_FOLDER_ID = "101-9iC3lCeXIuJ3ukWtW9Gxq5bdl0qKT";
        const DRIVE_EMBED_URL = `https://drive.google.com/embeddedfolderview?id=${DRIVE_FOLDER_ID}#list`;

        const pinIcon = L.icon({
            iconUrl: 'PIN LOGO.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const scanPoints = [
            {n: "SULU_ARCHIPELAGO", p: [6.0, 121.0], z: 10},
            {n: "ISABELA_SECTOR", p: [6.70, 121.97], z: 12},
            {n: "ZAMBOANGA_HQ", p: [6.92, 122.07], z: 14},
            {n: "SIBUGAY_DISTRICT", p: [7.78, 122.58], z: 11},
            {n: "ZN_PROVINCE", p: [8.15, 123.00], z: 10},
            {n: "ZS_PROVINCE", p: [7.90, 123.40], z: 10},
            {n: "ZAMPEN_FINAL_LOCK", p: [7.7, 122.8], z: 8}
        ];

        const map = L.map('map', { 
            zoomControl: false, attributionControl: false,
            dragging: false, scrollWheelZoom: false, doubleClickZoom: false
        }).setView(scanPoints[0].p, 8);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const statusText = document.getElementById('status-text');
        const hudCoord = document.getElementById('current-coord');
        const alertStatus = document.getElementById('alert-status');
        const siren = document.getElementById('siren-overlay');
        const reticle = document.getElementById('reticle');

        async function runTacticalSequence() {
            await new Promise(r => setTimeout(r, 1000));
            
            reticle.style.opacity = "1";
            siren.classList.add('siren-active'); 
            alertStatus.innerText = "SATELLITE_LOCK";
            alertStatus.style.color = "#ff3333";
            
            for (const point of scanPoints) {
                statusText.innerText = `SCANNING_${point.n}`;
                hudCoord.innerText = `${point.p[0].toFixed(4)}N / ${point.p[1].toFixed(4)}E`;
                map.flyTo(point.p, point.z, { duration: 1.2, easeLinearity: 0.1 });
                L.marker(point.p, { icon: pinIcon }).addTo(map)
                    .bindTooltip(point.n, { permanent: true, direction: 'right', className: 'tactical-label' });
                await new Promise(r => setTimeout(r, 1800));
            }

            siren.classList.remove('siren-active'); 
            initializeCommandCenter();
        }

        function initializeCommandCenter() {
            const commandUI = document.getElementById('command-interface');
            const orderFrame = document.getElementById('order-frame');
            const folderFrame = document.getElementById('folder-frame');
            
            alertStatus.innerText = "ACTIVE";
            alertStatus.style.color = "var(--accent-green)";
            statusText.innerText = "UPLINK_ESTABLISHED";
            
            // Load both frames
            orderFrame.src = GOOGLE_UPLINK;
            folderFrame.src = DRIVE_EMBED_URL;
            
            setTimeout(() => {
                commandUI.style.display = "block";
                setTimeout(() => {
                    commandUI.style.opacity = "1";
                    document.getElementById('map').style.filter = "brightness(0.05) blur(25px)";
                }, 100);
            }, 800);
        }

        window.onload = runTacticalSequence;
    </script>
</body>
</html>
