<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | TACTICAL SATELLITE RECON</title>
    
    <!-- LINK ICON LOGO (FAVICON) -->
    <link rel="icon" type="image/png" href="PIN LOGO.png">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
            --warning-red: rgba(255, 51, 51, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-green);
        }

        /* HEADER LOGO SECTION */
        #tactical-header {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px;
            background: rgba(0, 5, 10, 0.85);
            border-bottom: 1px solid var(--tactical-blue);
            display: flex; align-items: center; padding: 0 20px;
            z-index: 300; box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        #header-logo { height: 40px; margin-right: 15px; filter: drop-shadow(0 0 5px var(--tactical-blue)); }
        #header-title { font-weight: bold; letter-spacing: 2px; font-size: 14px; color: white; }

        /* FLUSHING SIREN OVERLAY */
        #siren-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 250; pointer-events: none; opacity: 0;
        }
        .siren-active { animation: sirenFlush 0.6s infinite alternate; }
        @keyframes sirenFlush {
            from { opacity: 0; background: transparent; }
            to { opacity: 1; background: var(--warning-red); }
        }

        /* THE MAP LAYER */
        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: brightness(0.6) contrast(1.2) saturate(0.3) sepia(0.5) hue-rotate(80deg);
        }

        /* TARGETING RETICLE */
        #reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border: 1px solid var(--accent-green);
            border-radius: 50%; z-index: 60;
            pointer-events: none; opacity: 0;
            transition: opacity 0.5s ease;
        }
        #reticle::before { content: ""; position: absolute; width: 140%; height: 1px; top: 50%; left: -20%; background: var(--accent-green); }
        #reticle::after { content: ""; position: absolute; width: 1px; height: 140%; left: 50%; top: -20%; background: var(--accent-green); }

        /* UPLINK INTERFACE */
        #form-container {
            position: absolute; top: 60px; left: 0; width: 100%; height: calc(100% - 60px);
            z-index: 400; display: none; opacity: 0;
            background-color: var(--bg-black);
            transition: opacity 1.5s ease-in-out;
        }

        iframe {
            position: absolute; top: 2%; left: 2%; width: 96%; height: 96%; 
            border: 1px solid var(--tactical-blue); background: transparent;
        }

        /* HUD ELEMENTS */
        #hud-data {
            position: absolute; top: 80px; left: 20px; z-index: 280;
            font-size: 11px; pointer-events: none;
            text-shadow: 0 0 8px var(--accent-green);
        }

        .tactical-label {
            background: rgba(0, 5, 10, 0.9) !important; 
            border: 1px solid var(--tactical-blue) !important;
            color: var(--tactical-blue) !important; font-size: 10px !important; font-weight: bold;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <header id="tactical-header">
        <img src="PIN LOGO.png" id="header-logo" alt="PRO9">
        <div id="header-title">PRO9 TACTICAL SATELLITE COMMAND</div>
    </header>

    <div id="siren-overlay"></div>
    <div id="map"></div>
    <div id="reticle"></div>
    
    <div id="hud-data">
        [ SYSTEM_OS: PRO9_RECON_v4.2 ]<br>
        [ STATUS: <span id="status-text" style="color:white">INITIALIZING_SCAN</span> ]<br>
        [ COORD: <span id="current-coord">---</span> ]<br>
        [ ALERT: <span id="alert-status">STANDBY</span> ]
    </div>

    <div id="form-container">
        <iframe id="target-frame" src="about:blank"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const GOOGLE_UPLINK = "https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec";

        // CUSTOM PIN ICON LOGO
        const pinIcon = L.icon({
            iconUrl: 'PIN LOGO.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20],
            popupAnchor: [0, -20]
        });

        const scanPoints = [
            {n: "SULU_ARCHIPELAGO", p: [6.0, 121.0], z: 10},
            {n: "ISABELA_SECTOR", p: [6.70, 121.97], z: 12},
            {n: "ZAMBOANGA_HQ", p: [6.92, 122.07], z: 14},
            {n: "SIBUGAY_DISTRICT", p: [7.78, 122.58], z: 11},
            {n: "ZN_PROVINCE", p: [8.15, 123.00], z: 10},
            {n: "ZS_PROVINCE", p: [7.90, 123.40], z: 10},
            {n: "ZAMPEN_FINAL_LOCK", p: [7.7, 122.8], z: 8}
        ];

        const map = L.map('map', { 
            zoomControl: false, attributionControl: false,
            dragging: false, scrollWheelZoom: false
        }).setView(scanPoints[0].p, 8);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const statusText = document.getElementById('status-text');
        const hudCoord = document.getElementById('current-coord');
        const alertStatus = document.getElementById('alert-status');
        const siren = document.getElementById('siren-overlay');
        const reticle = document.getElementById('reticle');

        async function runTacticalSequence() {
            reticle.style.opacity = "1";
            siren.classList.add('siren-active'); // SIREN ON
            alertStatus.innerText = "SATELLITE_LOCK_ACTIVE";
            alertStatus.style.color = "#ff3333";
            
            for (let i = 0; i < scanPoints.length; i++) {
                const point = scanPoints[i];
                statusText.innerText = `NAVIGATING_${point.n}`;
                hudCoord.innerText = `${point.p[0].toFixed(4)}N / ${point.p[1].toFixed(4)}E`;
                
                map.flyTo(point.p, point.z, { duration: 1.5, easeLinearity: 0.1 });

                L.marker(point.p, { icon: pinIcon }).addTo(map)
                    .bindTooltip(point.n, { permanent: true, direction: 'right', className: 'tactical-label' });

                await new Promise(r => setTimeout(r, 1800));
            }

            siren.classList.remove('siren-active'); // SIREN OFF
            establishUplink();
        }

        function establishUplink() {
            const container = document.getElementById('form-container');
            const frame = document.getElementById('target-frame');
            
            alertStatus.innerText = "UPLINK_STABLE";
            alertStatus.style.color = "var(--accent-green)";
            statusText.innerText = "ESTABLISHING_COMMAND_LINK";
            
            frame.src = GOOGLE_UPLINK;
            
            setTimeout(() => {
                container.style.display = "block";
                setTimeout(() => {
                    container.style.opacity = "1";
                    document.getElementById('map').style.filter = "brightness(0.1) blur(10px)";
                }, 50);
            }, 1000);
        }

        window.onload = runTacticalSequence;
    </script>
</body>
</html>
