<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | DRONEPILOT</title>
    
    <link rel="icon" type="image/png" href="PIN LOGO.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
            --warning-red: rgba(255, 51, 51, 0.8);
            --glass: rgba(0, 20, 40, 0.85);
            --ui-glow: 0 0 15px rgba(0, 212, 255, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-green);
        }

        /* SCANLINE / CRT EFFECT */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none; z-index: 3000; opacity: 0.4;
        }

        /* COMMAND HEADER */
        #tactical-header {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, var(--bg-black), transparent);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex; align-items: center; padding: 0 30px;
            z-index: 1100; box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        #header-logo { height: 38px; margin-right: 15px; filter: drop-shadow(0 0 8px var(--tactical-blue)); }
        #header-title { font-weight: bold; letter-spacing: 4px; font-size: 14px; color: #fff; text-shadow: 0 0 10px var(--tactical-blue); }

        /* ALERT OVERLAY */
        #siren-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 400; pointer-events: none; opacity: 0;
        }
        .siren-active { animation: sirenFlush 0.8s infinite alternate; }
        @keyframes sirenFlush {
            from { opacity: 0; }
            to { opacity: 1; background: radial-gradient(circle, transparent 30%, var(--warning-red) 100%); }
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: brightness(0.5) contrast(1.2) saturate(0.2) hue-rotate(170deg);
            transition: filter 3s ease-in-out;
        }

        /* RETICLE */
        #reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 1px solid rgba(0, 255, 102, 0.2);
            border-radius: 50%; z-index: 60;
            pointer-events: none; opacity: 0;
            transition: opacity 1s ease;
        }
        #reticle::before { content: ""; position: absolute; width: 140%; height: 1px; top: 50%; left: -20%; background: linear-gradient(90deg, transparent, var(--accent-green), transparent); }
        #reticle::after { content: ""; position: absolute; width: 1px; height: 140%; left: 50%; top: -20%; background: linear-gradient(180deg, transparent, var(--accent-green), transparent); }

        /* HUD DATA */
        #hud-data {
            position: absolute; bottom: 40px; right: 40px; z-index: 1100;
            font-size: 12px; text-align: right;
            line-height: 1.8; pointer-events: none;
            text-shadow: 0 0 5px var(--accent-green);
        }

        /* FLOATING ACCESS BUTTON */
        #folder-access-btn {
            position: absolute; bottom: 40px; left: 40px; z-index: 1300;
            padding: 12px 24px;
            background: rgba(0, 212, 255, 0.15);
            border: 1px solid var(--tactical-blue);
            color: var(--tactical-blue);
            font-family: 'Courier New', monospace;
            font-weight: bold; cursor: pointer;
            letter-spacing: 2px; transition: all 0.3s ease;
            box-shadow: var(--ui-glow);
            display: none;
            backdrop-filter: blur(5px);
        }
        #folder-access-btn:hover {
            background: var(--tactical-blue);
            color: var(--bg-black);
            box-shadow: 0 0 30px var(--tactical-blue);
            transform: scale(1.05);
        }

        /* UPLINK / FORM INTERFACE */
        #form-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1200; display: none; opacity: 0;
            background-color: var(--bg-black);
            transition: opacity 2s ease-in-out;
        }

        #logo-blend-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.35;
            mix-blend-mode: screen; pointer-events: none;
            animation: pulseBackground 8s infinite alternate ease-in-out;
        }

        .branding-content {
            position: relative; z-index: 10;
            display: flex; flex-direction: column; align-items: center;
            padding-top: 80px;
        }

        #form-branding-logo {
            height: 80px; filter: drop-shadow(0 0 20px var(--tactical-blue));
            animation: logoFloat 4s infinite alternate ease-in-out;
            margin-bottom: 15px;
        }

        #target-frame {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 90%; height: 60%; 
            border: 1px solid rgba(0, 212, 255, 0.4); 
            background: var(--glass);
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9);
            z-index: 20; border-radius: 4px;
            backdrop-filter: blur(15px);
        }

        /* DRIVE OVERLAY */
        #drive-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 10, 0.98);
            z-index: 4000; display: none; flex-direction: column;
            backdrop-filter: blur(15px);
        }
        #drive-header {
            height: 60px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 30px; border-bottom: 1px solid var(--tactical-blue);
            background: rgba(0, 212, 255, 0.05);
        }
        #close-drive {
            color: var(--warning-red); cursor: pointer; font-weight: bold;
            border: 1px solid var(--warning-red); padding: 8px 18px;
            transition: all 0.3s;
        }
        #close-drive:hover { background: var(--warning-red); color: white; }
        #drive-frame { flex-grow: 1; width: 100%; border: none; }

        /* UTILS */
        .tactical-label {
            background: rgba(0, 10, 20, 0.9) !important; border: 1px solid var(--tactical-blue) !important;
            color: var(--tactical-blue) !important; font-family: monospace !important;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }

        @keyframes pulseBackground { from { transform: scale(1); opacity: 0.2; } to { transform: scale(1.05); opacity: 0.4; } }
        @keyframes logoFloat { from { transform: translateY(0); } to { transform: translateY(-10px); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <header id="tactical-header">
        <img src="PIN LOGO.png" id="header-logo" alt="PRO9">
        <div id="header-title">DRONE_PILOT | REGIONAL OPS CENTER</div>
    </header>

    <div id="siren-overlay"></div>
    <div id="map"></div>
    <div id="reticle"></div>
    
    <div id="hud-data">
        <span style="color:rgba(0,255,102,0.5)">// SATELLITE_LINK_v3.4 //</span><br>
        NET_TYPE: <span style="color:#fff">ENCRYPTED_UPLINK</span><br>
        STATUS: <span id="status-text" style="color:#fff">INITIALIZING...</span><br>
        TARGET: <span id="current-coord" style="color:#fff">---</span><br>
        ALARM: <span id="alert-status" style="color:#fff">IDLE</span>
    </div>

    <!-- Data Interface (Uplink Screen) -->
    <div id="form-container">
        <img src="BLEND.png" id="logo-blend-bg" alt="Background">
        <div class="branding-content">
            <img src="PIN LOGO.png" id="form-branding-logo" alt="PRO9 LOGO">
            <div style="letter-spacing: 5px; font-size: 11px; opacity: 0.8; color: var(--tactical-blue);">
                SECURE_PROTOCOL // GOA_B_PIN_REQUEST
            </div>
        </div>
        <iframe id="target-frame" src="about:blank"></iframe>
    </div>

    <!-- Floating UI Button -->
    <button id="folder-access-btn" onclick="toggleDrive(true)">[ ACCESS_FILES ]</button>

    <!-- File Explorer Overlay -->
    <div id="drive-overlay">
        <div id="drive-header">
            <span style="letter-spacing: 3px;">DATABASE // CLOUD_ARCHIVE_SULU</span>
            <div id="close-drive" onclick="toggleDrive(false)">TERMINATE_SESSION [X]</div>
        </div>
        <iframe id="drive-frame" src="about:blank"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const GOOGLE_UPLINK = "https://script.google.com/macros/s/AKfycbyrbFRkTUh0mrtPZ0IYpqgNk3kwE3QRSet5eb7PF8aDHbZk_7ttjkizi2p2BMBLETDz/exec";
        const DRIVE_FOLDER = "https://drive.google.com/drive/folders/101-9iC3lCeXIuJ3ukWtW9Gxq5bdl0qKT";

        const pinIcon = L.icon({
            iconUrl: 'PIN LOGO.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const scanPoints = [
            {n: "SULU_ARCHIPELAGO", p: [6.0, 121.0], z: 10},
            {n: "ISABELA_SECTOR", p: [6.70, 121.97], z: 12},
            {n: "ZAMBOANGA_HQ", p: [6.92, 122.07], z: 14},
            {n: "SIBUGAY_DISTRICT", p: [7.78, 122.58], z: 11},
            {n: "ZN_PROVINCE", p: [8.15, 123.00], z: 10},
            {n: "ZS_PROVINCE", p: [7.90, 123.40], z: 10},
            {n: "ZAMPEN_FINAL_LOCK", p: [7.7, 122.8], z: 8}
        ];

        const map = L.map('map', { 
            zoomControl: false, attributionControl: false,
            dragging: false, scrollWheelZoom: false, doubleClickZoom: false
        }).setView(scanPoints[0].p, 8);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        // UI Element Selectors
        const statusText = document.getElementById('status-text');
        const hudCoord = document.getElementById('current-coord');
        const alertStatus = document.getElementById('alert-status');
        const siren = document.getElementById('siren-overlay');
        const reticle = document.getElementById('reticle');
        const folderBtn = document.getElementById('folder-access-btn');
        const driveOverlay = document.getElementById('drive-overlay');
        const driveFrame = document.getElementById('drive-frame');

        // Sequence Controller
        async function runTacticalSequence() {
            await new Promise(r => setTimeout(r, 1500));
            
            reticle.style.opacity = "1";
            siren.classList.add('siren-active'); 
            alertStatus.innerText = "SATELLITE_LOCK";
            alertStatus.style.color = "#ff3333";
            
            for (const point of scanPoints) {
                statusText.innerText = `SCANNING_${point.n}`;
                hudCoord.innerText = `${point.p[0].toFixed(4)}N / ${point.p[1].toFixed(4)}E`;
                
                map.flyTo(point.p, point.z, { duration: 1.5, easeLinearity: 0.1 });
                
                L.marker(point.p, { icon: pinIcon }).addTo(map)
                    .bindTooltip(point.n, { permanent: true, direction: 'right', className: 'tactical-label' });

                await new Promise(r => setTimeout(r, 2000));
            }

            siren.classList.remove('siren-active'); 
            establishUplink();
        }

        function establishUplink() {
            const container = document.getElementById('form-container');
            const frame = document.getElementById('target-frame');
            
            alertStatus.innerText = "STABLE";
            alertStatus.style.color = "var(--accent-green)";
            statusText.innerText = "UPLINK_READY";
            
            frame.src = GOOGLE_UPLINK;
            folderBtn.style.display = "block"; // Reveal the folder access button

            setTimeout(() => {
                container.style.display = "block";
                setTimeout(() => {
                    container.style.opacity = "1";
                    document.getElementById('map').style.filter = "brightness(0.05) blur(15px)";
                    statusText.innerText = "SYSTEM_ONLINE";
                }, 100);
            }, 1000);
        }

        function toggleDrive(show) {
            if (show) {
                driveFrame.src = DRIVE_FOLDER;
                driveOverlay.style.display = "flex";
                statusText.innerText = "BROWSING_ARCHIVES";
            } else {
                driveOverlay.style.display = "none";
                driveFrame.src = "about:blank";
                statusText.innerText = "SYSTEM_ONLINE";
            }
        }

        window.onload = runTacticalSequence;
    </script>
</body>
</html>
