<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | DRONEPILOT OPS</title>
    
    <link rel="icon" type="image/png" href="PIN LOGO.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
            --warning-red: rgba(255, 51, 51, 0.8);
            --glass: rgba(0, 20, 40, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-green);
        }

        /* SCANNER OVERLAY EFFECTS */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none; z-index: 2000; opacity: 0.3;
        }

        /* COMMAND HEADER */
        #tactical-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, var(--bg-black), transparent);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex; align-items: center; padding: 0 30px;
            z-index: 2100; box-sizing: border-box; backdrop-filter: blur(5px);
        }
        #header-logo { height: 38px; margin-right: 15px; filter: drop-shadow(0 0 8px var(--tactical-blue)); }
        #header-title { font-weight: bold; letter-spacing: 4px; font-size: 14px; color: #fff; text-shadow: 0 0 10px var(--tactical-blue); }

        /* FLOATING ACTION BUTTON */
        #floating-db-btn {
            position: absolute;
            bottom: 30px;
            left: 30px;
            z-index: 2500;
            background: rgba(0, 20, 40, 0.8);
            border: 1px solid var(--tactical-blue);
            color: var(--tactical-blue);
            padding: 12px 20px;
            font-family: inherit;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            letter-spacing: 2px;
            display: none; /* Initially hidden */
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            transition: all 0.3s ease;
        }
        #floating-db-btn:hover {
            background: var(--tactical-blue);
            color: #000;
            box-shadow: 0 0 25px var(--tactical-blue);
        }

        /* FOLDER OVERLAY */
        #folder-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3000; display: none; background: rgba(0, 5, 10, 0.95);
            backdrop-filter: blur(10px);
        }
        .close-btn {
            position: absolute; top: 80px; right: 40px;
            color: var(--warning-red); cursor: pointer;
            font-weight: bold; letter-spacing: 2px;
        }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.5) contrast(1.2) saturate(0.2) hue-rotate(170deg);
            transition: filter 3s ease-in-out;
        }

        /* RETICLE & HUD */
        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 1px solid rgba(0, 255, 102, 0.3);
            border-radius: 50%; z-index: 60; pointer-events: none; opacity: 0; transition: opacity 1s;
        }
        #reticle::before { content: ""; position: absolute; width: 160%; height: 1px; top: 50%; left: -30%; background: linear-gradient(90deg, transparent, var(--accent-green), transparent); }
        #reticle::after { content: ""; position: absolute; width: 1px; height: 160%; left: 50%; top: -30%; background: linear-gradient(180deg, transparent, var(--accent-green), transparent); }

        #hud-data {
            position: absolute; bottom: 40px; right: 40px; z-index: 1100;
            font-size: 12px; text-align: right; line-height: 1.8; pointer-events: none;
            text-shadow: 0 0 5px var(--accent-green);
        }

        /* UPLINK INTERFACE */
        #form-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1200; display: none; opacity: 0;
            background-color: var(--bg-black);
            transition: opacity 2s ease-in-out;
        }

        #logo-blend-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: 1; opacity: 0.35; mix-blend-mode: screen;
            animation: pulseBackground 8s infinite alternate ease-in-out;
        }

        iframe {
            position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%);
            width: 90%; height: 65%; border: 1px solid rgba(0, 212, 255, 0.4); 
            background: var(--glass); z-index: 20; border-radius: 4px;
        }

        .tactical-label {
            background: rgba(0, 10, 20, 0.9) !important; 
            border: 1px solid var(--tactical-blue) !important;
            color: var(--tactical-blue) !important; font-family: monospace !important;
        }

        @keyframes pulseBackground { from { opacity: 0.2; } to { opacity: 0.5; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <header id="tactical-header">
        <img src="PIN LOGO.png" id="header-logo" alt="PRO9">
        <div id="header-title">DRONE_PILOT | REGIONAL OPS CENTER</div>
    </header>

    <button id="floating-db-btn" onclick="toggleFolder()">OPEN_DATABASE_ARCHIVE</button>

    <div id="folder-overlay">
        <div class="close-btn" onclick="toggleFolder()">[ TERMINATE_REMOTE_VIEW ]</div>
        <iframe src="https://drive.google.com/drive/folders/101-9iC3lCeXIuJ3ukWtW9Gxq5bdl0qKT" style="height: 80%; top: 15%;"></iframe>
    </div>

    <div id="siren-overlay"></div>
    <div id="map"></div>
    <div id="reticle"></div>
    
    <div id="hud-data">
        <span style="color:rgba(0,255,102,0.5)">// SYSTEM_INIT //</span><br>
        STATUS: <span id="status-text" style="color:#fff">BOOTING...</span><br>
        COORD: <span id="current-coord" style="color:#fff">---</span><br>
        ALARM: <span id="alert-status" style="color:#fff">READY</span>
    </div>

    <div id="form-container">
        <img src="BLEND.png" id="logo-blend-bg" alt="Background">
        <div style="text-align: center; padding-top: 80px; position: relative; z-index: 10;">
            <img src="PIN LOGO.png" style="height: 90px; filter: drop-shadow(0 0 20px var(--tactical-blue));">
            <div style="letter-spacing: 5px; font-size: 12px; opacity: 0.8; margin-top: 10px;">DRONEPILOT // ORDER_UPLINK</div>
        </div>
        <iframe id="target-frame" src="about:blank"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const GOOGLE_UPLINK = "https://script.google.com/macros/s/AKfycbyrbFRkTUh0mrtPZ0IYpqgNk3kwE3QRSet5eb7PF8aDHbZk_7ttjkizi2p2BMBLETDz/exec";

        const pinIcon = L.icon({
            iconUrl: 'PIN LOGO.png',
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

         const scanPoints = [
            {n: "SULU_ARCHIPELAGO", p: [6.0, 121.0], z: 10},
            {n: "ISABELA_SECTOR", p: [6.70, 121.97], z: 12},
            {n: "ZAMBOANGA_HQ", p: [6.92, 122.07], z: 14},
            {n: "SIBUGAY_DISTRICT", p: [7.78, 122.58], z: 11},
            {n: "ZN_PROVINCE", p: [8.15, 123.00], z: 10},
            {n: "ZS_PROVINCE", p: [7.90, 123.40], z: 10},
            {n: "ZAMPEN_FINAL_LOCK", p: [7.7, 122.8], z: 8}
        ];

        const map = L.map('map', { 
            zoomControl: false, attributionControl: false,
            dragging: false, scrollWheelZoom: false
        }).setView(scanPoints[0].p, 8);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        async function runTacticalSequence() {
            const statusText = document.getElementById('status-text');
            const hudCoord = document.getElementById('current-coord');
            const alertStatus = document.getElementById('alert-status');
            const reticle = document.getElementById('reticle');

            await new Promise(r => setTimeout(r, 1000));
            reticle.style.opacity = "1";
            alertStatus.innerText = "SATELLITE_LOCK";
            alertStatus.style.color = "#ff3333";
            
            for (let point of scanPoints) {
                statusText.innerText = `SCANNING_${point.n}`;
                hudCoord.innerText = `${point.p[0]}N / ${point.p[1]}E`;
                map.flyTo(point.p, point.z, { duration: 1.8 });
                L.marker(point.p, { icon: pinIcon }).addTo(map)
                    .bindTooltip(point.n, { permanent: true, className: 'tactical-label' });
                await new Promise(r => setTimeout(r, 2200));
            }
            establishUplink();
        }

        function establishUplink() {
            document.getElementById('target-frame').src = GOOGLE_UPLINK;
            document.getElementById('status-text').innerText = "UPLINK_ESTABLISHED";
            document.getElementById('alert-status').innerText = "CONNECTION_STABLE";
            document.getElementById('alert-status').style.color = "var(--accent-green)";
            
            setTimeout(() => {
                document.getElementById('form-container').style.display = "block";
                document.getElementById('floating-db-btn').style.display = "block"; // Show button
                setTimeout(() => {
                    document.getElementById('form-container').style.opacity = "1";
                    document.getElementById('map').style.filter = "brightness(0.05) blur(20px)";
                }, 100);
            }, 1000);
        }

        function toggleFolder() {
            const overlay = document.getElementById('folder-overlay');
            const isHidden = overlay.style.display === "none" || overlay.style.display === "";
            overlay.style.display = isHidden ? "block" : "none";
            document.getElementById('status-text').innerText = isHidden ? "ARCHIVE_ACTIVE" : "UPLINK_ESTABLISHED";
        }

        window.onload = runTacticalSequence;
    </script>
</body>
</html>
