<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | TACTICAL SATELLITE RECON</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', Courier, monospace;
        }

        /* THE MAP LAYER */
        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: brightness(0.5) contrast(1.2) saturate(0.2) hue-rotate(180deg);
        }

        /* TARGETING RETICLE (FOLLOWS ZOOM) */
        #reticle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            border: 2px solid var(--accent-green);
            border-radius: 50%;
            z-index: 60;
            pointer-events: none;
            opacity: 0;
            animation: pulseReticle 1s infinite ease-in-out;
        }
        #reticle::before, #reticle::after {
            content: ""; position: absolute; background: var(--accent-green);
        }
        #reticle::before { width: 100%; height: 1px; top: 50%; left: 0; }
        #reticle::after { width: 1px; height: 100%; left: 50%; top: 0; }

        @keyframes pulseReticle {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.7; transform: translate(-50%, -50%) scale(1.05); }
        }

        /* THE FORM CONTAINER */
        #form-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: none; opacity: 0;
            background-color: #000;
            transition: opacity 1s ease-in-out;
        }

        #tactical-blend-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('BLEND.png') no-repeat center/cover;
            z-index: 110;
            pointer-events: none;
            mix-blend-mode: screen;
            opacity: 0.6;
        }

        iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%; border: none;
            z-index: 105;
        }

        /* DATA READOUT */
        #hud-data {
            position: absolute;
            top: 20px; left: 20px;
            z-index: 70;
            color: var(--accent-green);
            font-size: 12px;
            pointer-events: none;
            text-shadow: 0 0 5px #000;
        }

        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(0, 212, 255, 0.3);
            z-index: 120;
            top: 0;
            pointer-events: none;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .tactical-label {
            background: rgba(0,0,0,0.7) !important; border: 1px solid var(--accent-green) !important;
            color: var(--accent-green) !important; font-size: 9px !important;
            padding: 2px 5px !important; text-transform: uppercase;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="map"></div>
    <div id="reticle"></div>
    
    <div id="hud-data">
        STATUS: SCANNING_ZAMPEN_SECTOR...<br>
        COORD: <span id="current-coord">INITIALIZING</span><br>
        MODE: SATELLITE_THERMAL
    </div>

    <!-- The Data Interface -->
    <div id="form-container">
        <div id="tactical-blend-overlay"></div>
        <div class="scan-line"></div>
        <iframe src="https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Navigation Points (Scanning Sequence)
        const scanPoints = [
            {n: "SULU", p: [6.0, 121.0], z: 12},
            {n: "ISABELA CITY", p: [6.70, 121.97], z: 12},
            {n: "ZAMBOANGA CITY", p: [6.92, 122.07], z: 12},
            {n: "ZAMBOANGA SIBUGAY", p: [7.78, 122.58], z: 10},
            {n: "ZAMBOANGA DEL NORTE", p: [8.15, 123.00], z: 10},
            {n: "ZAMBOANGA DEL SUR", p: [7.90, 123.40], z: 10},
            {n: "REGIONAL_COVERAGE", p: [7.7, 122.8], z: 8} // Final View
        ];

        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView(scanPoints[0].p, 12);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const hudCoord = document.getElementById('current-coord');
        const reticle = document.getElementById('reticle');

        async function startTacticalScan() {
            reticle.style.opacity = "1";
            
            // Sequential Scanning Loop
            for (let i = 0; i < scanPoints.length; i++) {
                const point = scanPoints[i];
                
                // Update HUD text
                hudCoord.innerText = `${point.p[0].toFixed(4)}N, ${point.p[1].toFixed(4)}E | ${point.n}`;
                
                // Fly to point
                map.flyTo(point.p, point.z, {
                    duration: 1.5,
                    easeLinearity: 0.25
                });

                // Add Tactical Marker
                L.circleMarker(point.p, {
                    radius: 5, color: '#00ff66', fillColor: '#00ff66', fillOpacity: 0.8
                }).addTo(map).bindTooltip(point.n, {
                    permanent: true, direction: 'top', className: 'tactical-label'
                });

                // Pause at each location for "Data Acquisition"
                await new Promise(r => setTimeout(r, 1800));
            }

            // Final regional pullback complete, transition to form
            transitionToInterface();
        }

        function transitionToInterface() {
            const container = document.getElementById('form-container');
            const mapEl = document.getElementById('map');
            const hud = document.getElementById('hud-data');

            hud.innerHTML = "STATUS: UPLINK_ESTABLISHED<br>SECTOR: PRO9_DATA_CENTRAL";
            
            container.style.display = "block";
            setTimeout(() => { 
                container.style.opacity = "1";
                reticle.style.opacity = "0";
                setTimeout(() => { mapEl.style.display = "none"; }, 1000);
            }, 50);
        }

        window.onload = startTacticalScan;
    </script>
</body>
</html>
