<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | TACTICAL AERIAL VIEW</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Segoe UI', sans-serif;
        }

        /* 1. THE MAP LAYER */
        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            /* Tactical Satellite Color Grade */
            filter: brightness(0.4) contrast(1.4) saturate(0.6) hue-rotate(185deg);
        }

        /* 2. THE PIN LOGO (SATELLITE ZOOM ELEMENT) */
        #zoom-pin {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 120px; height: 120px;
            background: url('PIN LOGO.png') no-repeat center/contain;
            z-index: 50;
            pointer-events: none;
            filter: drop-shadow(0 0 20px var(--tactical-blue));
            opacity: 0;
            /* Animation: Starts huge (zoomed in) and shrinks (zoom out effect) */
            animation: tacticalZoomOut 2.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 3. THE FORM CONTAINER (WITH BLEND.png) */
        #form-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100;
            display: none; opacity: 0;
            /* Using BLEND.png as the tactical background for the form */
            background: url('BLEND.png') no-repeat center/cover;
            transition: opacity 1s ease-in-out;
        }

        iframe {
            width: 100%; height: 100%; border: none;
            /* Makes form slightly transparent to see BLEND.png through it if form is clear */
            background: transparent; 
        }

        /* ZOOM OUT ANIMATION */
        @keyframes tacticalZoomOut {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(8); 
                filter: brightness(5) blur(10px);
            }
            20% { 
                opacity: 1; 
                filter: brightness(1.5) blur(0px);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.2); 
            }
        }

        /* HUD Elements */
        .scan-line {
            position: absolute; width: 100%; height: 2px;
            background: rgba(0, 212, 255, 0.2);
            z-index: 60; top: 0;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        .tactical-label {
            background: none !important; border: none !important;
            color: var(--accent-green) !important; font-size: 10px !important;
            font-weight: bold; text-shadow: 0 0 5px black;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="map"></div>
    <div id="zoom-pin"></div>
    <div class="scan-line"></div>

    <!-- The Data Interface -->
    <div id="form-container">
        <iframe src="https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec"></iframe>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // Coordinate Setup
        const SULU = [6.0, 121.0];
        const ZAMPEN_AOR = [7.7, 122.8]; // Pull out to see everything

        // Initialize Map: Start zoomed into Sulu
        const map = L.map('map', { 
            zoomControl: false, 
            attributionControl: false 
        }).setView(SULU, 14);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        function startAerialSequence() {
            // 1. Sync Map Zoom with CSS Animation
            setTimeout(() => {
                map.flyTo(ZAMPEN_AOR, 8, {
                    duration: 3, // Matches the feel of the zoom-out
                    easeLinearity: 0.1
                });
                
                // Add Tactical Markers during flight
                addNodes();
            }, 500);

            // 2. Transition to Form with BLEND.png background
            setTimeout(() => {
                const container = document.getElementById('form-container');
                container.style.display = "block";
                setTimeout(() => { 
                    container.style.opacity = "1";
                    document.getElementById('map').style.display = "none"; 
                }, 50);
            }, 3500);
        }

        function addNodes() {
            const locations = [
                {n: "SULU SECTOR", p: [6.0, 121.0]},
                {n: "ZAMBOANGA CITY", p: [6.92, 122.07]},
                {n: "IPIL", p: [7.78, 122.58]},
                {n: "PAGADIAN", p: [7.82, 123.43]},
                {n: "DIPOLOG", p: [8.58, 123.34]}
            ];

            locations.forEach((loc, i) => {
                setTimeout(() => {
                    L.circleMarker(loc.p, {
                        radius: 4, color: '#fff', fillColor: '#00ff66', fillOpacity: 1
                    }).addTo(map).bindTooltip(loc.n, {
                        permanent: true, direction: 'right', className: 'tactical-label'
                    });
                }, i * 300 + 1000);
            });
        }

        window.onload = startAerialSequence;
    </script>
</body>
</html>
