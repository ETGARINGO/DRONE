<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | DRONEPILOT TACTICAL UPLINK</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --warning-red: #ff3333;
            --bg-black: #00050a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Segoe UI', 'Courier New', monospace;
        }

        /* 1. SATELLITE MAP ENGINE */
        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            filter: brightness(0.35) contrast(1.3) saturate(0.4) hue-rotate(180deg);
        }

        /* 2. PIN LOGO - AERIAL ZOOM EFFECT */
        #zoom-pin {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 150px; height: 150px;
            background: url('PIN LOGO.png') no-repeat center/contain;
            z-index: 50; pointer-events: none;
            opacity: 0;
            animation: droneDrop 2.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 3. TACTICAL OVERLAY (BLEND.png) */
        #interface-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 100; display: none; opacity: 0;
            background: url('BLEND.png') no-repeat center/cover;
            transition: opacity 1s ease-in;
            display: flex; justify-content: center; align-items: center;
        }

        /* 4. CLEAR ORDER FORM MODULE */
        .order-module {
            width: 92%; max-width: 850px; height: 88vh;
            background: rgba(255, 255, 255, 0.98); /* Near-solid for maximum clarity */
            border: 3px solid var(--tactical-blue);
            box-shadow: 0 0 60px rgba(0, 212, 255, 0.4), inset 0 0 20px rgba(0,0,0,0.1);
            position: relative; border-radius: 2px;
            display: flex; flex-direction: column;
        }

        .module-header {
            background: var(--bg-black);
            color: var(--tactical-blue);
            padding: 12px 20px;
            font-size: 13px; font-weight: 900;
            letter-spacing: 3px; border-bottom: 2px solid var(--tactical-blue);
            display: flex; justify-content: space-between; align-items: center;
        }

        .status-blink {
            width: 10px; height: 10px; background: var(--accent-green);
            border-radius: 50%; animation: blink 1s infinite;
        }

        iframe {
            flex-grow: 1; width: 100%; border: none;
            /* Ensures form is 100% visible */
        }

        /* ANIMATIONS */
        @keyframes droneDrop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(12); filter: blur(15px) brightness(3); }
            15% { opacity: 1; filter: blur(0px) brightness(1); }
            85% { opacity: 1; transform: translate(-50%, -50%) scale(0.8); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .tactical-label {
            background: rgba(0,0,0,0.7) !important; border: 1px solid var(--accent-green) !important;
            color: var(--accent-green) !important; font-size: 11px !important;
            padding: 2px 6px !important; text-transform: uppercase;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="map"></div>
    <div id="zoom-pin"></div>
    
    <div id="interface-layer">
        <div class="order-module">
            <div class="module-header">
                <span>[ PILOT_MODE: ACTIVE ] // ORDER_FORM_SECURE</span>
                <div class="status-blink"></div>
            </div>
            
            <iframe src="https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec"></iframe>
            
            <!-- Bottom Data Strip -->
            <div style="background: var(--bg-black); height: 5px; width: 100%;"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // NAVIGATION POINTS
        const SULU_ORIGIN = [6.00, 121.00];
        const ZAMPEN_HUB = [7.75, 122.90]; 

        // Initialize Map at Sulu
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView(SULU_ORIGIN, 14);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        function initDroneSequence() {
            // 1. Zoom Out Animation
            setTimeout(() => {
                map.flyTo(ZAMPEN_HUB, 8, {
                    duration: 3.5,
                    easeLinearity: 0.1
                });
                deployWaypoints();
            }, 600);

            // 2. Final Form Reveal
            setTimeout(() => {
                const layer = document.getElementById('interface-layer');
                layer.style.display = "flex";
                setTimeout(() => { 
                    layer.style.opacity = "1";
                    // Cleanup background to focus CPU on Form
                    setTimeout(() => { document.getElementById('map').style.display = "none"; }, 1000);
                }, 50);
            }, 4000);
        }

        function deployWaypoints() {
            const nodes = [
                {t: "SULU_SCTR", p: [6.00, 121.00]},
                {t: "ZAMBO_BASE", p: [6.92, 122.07]},
                {t: "ZAMPEN_HQ", p: [7.82, 123.43]}
            ];

            nodes.forEach((n, i) => {
                setTimeout(() => {
                    L.circleMarker(n.p, { radius: 6, color: '#00ff66', weight: 2, fillOpacity: 0.5 })
                    .addTo(map).bindTooltip(n.t, { permanent: true, className: 'tactical-label', direction: 'right' });
                }, i * 500 + 1200);
            });
        }

        window.onload = initDroneSequence;
    </script>
</body>
</html>
