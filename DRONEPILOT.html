<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tactical Map Uplink</title>
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --alert-red: #ff3c3c;
            --map-bg: #020b16;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 1. BACKGROUND BLEND LAYER */
        #blend-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('BLEND.png') center/cover no-repeat;
            opacity: 0;
            z-index: 2;
            mix-blend-mode: screen;
            animation: lightningStrike 1.5s ease-out forwards;
        }

        /* 2. THE HUD GRID OVERLAY */
        #hud-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            border: 20px solid rgba(0, 212, 255, 0.1);
            background: 
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            opacity: 0;
            animation: hudFadeIn 0.5s ease-out 2s forwards;
        }

        /* 3. TACTICAL PIN LOGO */
        #pin-logo {
            position: absolute;
            width: 120px;
            height: 120px;
            background: url('PIN LOGO.png') center/contain no-repeat;
            z-index: 15;
            transform: scale(5);
            filter: brightness(5) drop-shadow(0 0 20px var(--tactical-blue));
            opacity: 0;
            animation: targetLock 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* 4. THE MAP (IFRAME) CONTAINER */
        #map-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            transform: scale(15); /* Start at ground level zoom */
            filter: blur(20px) brightness(0);
            animation: satelliteZoomOut 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) 1s forwards;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--map-bg);
        }

        /* ANIMATIONS */

        /* Lightning Strike / Flash */
        @keyframes lightningStrike {
            0% { opacity: 0; background-color: #fff; }
            10% { opacity: 1; background-color: #00d4ff; }
            20% { opacity: 0.3; }
            30% { opacity: 0.8; }
            100% { opacity: 0.4; }
        }

        /* Pin Logo Target Drop */
        @keyframes targetLock {
            0% { opacity: 0; transform: scale(8); }
            50% { opacity: 1; transform: scale(1); filter: brightness(2); }
            80% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(0.5); filter: brightness(1); }
        }

        /* Aerial Zoom Out Sequence */
        @keyframes satelliteZoomOut {
            0% { transform: scale(15); filter: blur(15px) brightness(0); }
            30% { filter: blur(5px) brightness(0.5); }
            100% { transform: scale(1); filter: blur(0px) brightness(1); }
        }

        /* HUD Appearance */
        @keyframes hudFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Scanning Line Effect */
        #hud-overlay::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(0, 212, 255, 0.2);
            box-shadow: 0 0 15px var(--tactical-blue);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

    <!-- Atmospheric Blend -->
    <div id="blend-layer"></div>

    <!-- HUD Elements -->
    <div id="hud-overlay"></div>

    <!-- The Tactical Pin -->
    <div id="pin-logo"></div>

    <!-- The Map Frame -->
    <div id="map-container">
        <iframe 
            src="https://script.google.com/macros/s/AKfycbzvJifcj_nQkvV7mzky_ounblj4_eIFZtLtoeT-xCGXNEOhyuTfokJWmu4aFtCl5lel/exec"
            allow="geolocation">
        </iframe>
    </div>

</body>
</html>
