<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO9 | DRONE PILOT V2</title>

<link rel="icon" href="PIN LOGO.png">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root{
    --green:#00ff66;
    --blue:#00d4ff;
}

body{
    margin:0;
    overflow:hidden;
    background:#000;
    font-family:monospace;
    color:var(--green);
}

/* MAP */
#map{
    position:absolute;
    width:100%;
    height:100%;
    filter:brightness(.5) contrast(1.2) saturate(.2) hue-rotate(170deg);
    transition:2s;
}

/* VIDEO */
#video{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0;
    transition:2s;
}

/* OVERLAY */
#blend{
    position:absolute;
    width:100%;
    height:100%;
    opacity:.25;
    mix-blend-mode:screen;
    animation:pulse 8s infinite alternate;
}

/* HEADER */
header{
    position:absolute;
    top:0;
    width:100%;
    padding:15px;
    display:flex;
    align-items:center;
    z-index:2000;
}
header img{height:35px;margin-right:10px;}
header span{color:#fff;letter-spacing:3px;}

/* HUD */
#hud{
    position:absolute;
    bottom:20px;
    right:20px;
    z-index:2000;
    font-size:12px;
}

/* RETICLE */
#reticle{
    position:absolute;
    top:50%;
    left:50%;
    width:260px;
    height:260px;
    transform:translate(-50%,-50%);
    border:1px solid rgba(0,255,102,.2);
    border-radius:50%;
}

/* TRACKING BOX */
#tracker{
    position:absolute;
    width:120px;
    height:80px;
    border:2px solid red;
    display:none;
}

/* SCANLINES */
body::before{
    content:"";
    position:absolute;
    width:100%;
    height:100%;
    background:linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,.3) 50%);
    background-size:100% 3px;
    opacity:.3;
    pointer-events:none;
}

/* GLITCH */
.glitch{animation:glitch .3s;}
@keyframes glitch{
    0%{transform:translate(0)}
    50%{transform:translate(3px,-2px)}
    100%{transform:translate(0)}
}

@keyframes pulse{
    from{transform:scale(1);}
    to{transform:scale(1.05);}
}
</style>
</head>

<body>

<header>
<img src="PIN LOGO.png">
<span>DRONE SYSTEM V2</span>
</header>

<div id="map"></div>
<video id="video" muted playsinline></video>
<img src="BLEND.png" id="blend">

<div id="reticle"></div>
<div id="tracker"></div>

<div id="hud">
STATUS: <span id="status">BOOTING...</span><br>
TARGET: <span id="coord">---</span><br>
MODE: <span id="mode">INIT</span><br>
SIGNAL: <span id="signal">100%</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
/* MAP */
const map = L.map('map',{zoomControl:false,dragging:false}).setView([6.92,122.07],8);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

/* DATA */
const points=[
{n:"SULU",p:[6,121],z:10,d:1500},
{n:"ISABELA",p:[6.7,121.97],z:12,d:1500},
{n:"ZAMBOANGA",p:[6.92,122.07],z:14,d:2000,final:true}
];

const videoSrc="Vidshirt.mp4";

/* UI */
const status=document.getElementById("status");
const coord=document.getElementById("coord");
const mode=document.getElementById("mode");
const signal=document.getElementById("signal");
const video=document.getElementById("video");
const tracker=document.getElementById("tracker");

/* SEQUENCE */
async function start(){
    mode.textContent="SCAN";

    for(const p of points){
        status.textContent="TRACKING "+p.n;
        coord.textContent=p.p.join(",");
        map.flyTo(p.p,p.z,{duration:1.2});

        await delay(p.d);

        if(p.final){
            mode.textContent="LOCK";
            break;
        }
    }

    startVideo();
}

/* VIDEO */
function startVideo(){
    mode.textContent="CINEMATIC";
    video.src=videoSrc;

    video.onloadeddata=()=>{
        document.getElementById("map").style.filter="blur(20px) brightness(.1)";
        video.style.opacity=1;
        video.play();
        tracker.style.display="block";
        moveTracker();
    };

    video.onended=()=>{
        video.currentTime=0;
        video.play(); // LOOP
    };
}

/* TRACKER */
function moveTracker(){
    setInterval(()=>{
        tracker.style.left=Math.random()*80+"%";
        tracker.style.top=Math.random()*70+"%";
    },1000);
}

/* SIGNAL EFFECT */
setInterval(()=>{
    let val=Math.floor(Math.random()*40)+60;
    signal.textContent=val+"%";
},2000);

/* GLITCH */
setInterval(()=>{
    video.classList.add("glitch");
    setTimeout(()=>video.classList.remove("glitch"),200);
},7000);

/* UTILS */
function delay(ms){return new Promise(r=>setTimeout(r,ms));}

/* CONTROLS */
document.addEventListener("keydown",e=>{
    if(e.key===" ") video.paused?video.play():video.pause();
    if(e.key==="r") video.currentTime=0;
});

/* INIT */
window.onload=start;
</script>

</body>
</html>
