
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRO9 | TACTICAL DRONE SYSTEM</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
:root {
    --neon-green: #00ff66;
    --neon-blue: #00d4ff;
    --alert-red: #ff3333;
    --terminal-bg: #00050a;
}

* { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }

body {
    background: #000;
    font-family: 'Courier New', Courier, monospace;
    overflow: hidden;
    color: var(--neon-green);
    text-transform: uppercase;
}

/* SCANLINES & VIGNETTE */
body::after {
    content: "";
    position: absolute;
    inset: 0;
    background: 
        linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        radial-gradient(circle, rgba(0,0,0,0) 40%, rgba(0,0,0,0.8) 100%);
    background-size: 100% 4px, 100% 100%;
    pointer-events: none;
    z-index: 5000;
}

/* MAP STYLING */
#map {
    position: absolute;
    width: 100%;
    height: 100%;
    filter: brightness(0.4) contrast(1.4) saturate(0) sepia(1) hue-rotate(100deg);
    transition: filter 3s ease, transform 3s ease;
}

/* CINEMATIC VIDEO */
#video-container {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
    opacity: 0;
    transform: scale(1.2);
    transition: all 1.5s cubic-bezier(0.19, 1, 0.22, 1);
    pointer-events: none;
}

#video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border: 0px solid var(--neon-green);
}

/* TOP HEADER */
header {
    position: absolute;
    top: 0; width: 100%;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    z-index: 2000;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

.brand { display: flex; align-items: center; gap: 15px; }
.brand img { height: 40px; filter: drop-shadow(0 0 5px var(--neon-green)); }
.rec-dot { width: 10px; height: 10px; background: red; border-radius: 50%; animation: blink 1s infinite; }

/* DATA HUD */
.hud-box {
    position: absolute;
    z-index: 2000;
    background: rgba(0, 20, 10, 0.7);
    border-left: 3px solid var(--neon-green);
    padding: 10px;
    font-size: 12px;
}

#hud-tl { top: 80px; left: 20px; }
#hud-br { bottom: 30px; right: 20px; text-align: right; }

/* RETICLE */
#reticle {
    position: absolute;
    top: 50%; left: 50%;
    width: 300px; height: 300px;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(0, 255, 102, 0.3);
    border-radius: 50%;
    pointer-events: none;
    z-index: 1000;
}
.crosshair {
    position: absolute;
    background: var(--neon-green);
    opacity: 0.5;
}
.ch-v { width: 1px; height: 100%; left: 50%; top: 0; }
.ch-h { height: 1px; width: 100%; top: 50%; left: 0; }

/* LEAFLET OVERRIDE */
.tactical-label {
    background: #000 !important;
    border: 1px solid var(--neon-green) !important;
    color: var(--neon-green) !important;
    font-family: monospace;
    box-shadow: 0 0 10px rgba(0,255,102,0.5);
}

/* ANIMATIONS */
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

.glitch-active { animation: glitch 0.2s infinite; }
@keyframes glitch {
    0% { clip: rect(42px, 9999px, 44px, 0); transform: skew(0.5deg); }
    50% { clip: rect(12px, 9999px, 90px, 0); transform: skew(-0.5deg); }
    100% { clip: rect(67px, 9999px, 30px, 0); transform: skew(0.2deg); }
}

#overlay-msg {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
}
</style>
</head>

<body>

<!-- Start Prompt (Required for Video/Audio Autoplay) -->
<div id="overlay-msg" onclick="initSystem()">
    <div>
        <h1 style="letter-spacing: 10px;">INITIALIZE PRO9</h1>
        <p style="margin-top: 10px; color: #fff;">[ CLICK TO ESTABLISH LINK ]</p>
    </div>
</div>

<header>
    <div class="brand">
        <img src="PIN LOGO.png" alt="Logo">
        <div>
            <div style="font-weight: bold; letter-spacing: 2px;">PRO9 // ARCHER-1</div>
            <div style="font-size: 10px; color: var(--neon-blue);">ENCRYPTED UPLINK ACTIVE</div>
        </div>
    </div>
    <div style="display:flex; align-items:center; gap:10px;">
        <span id="clock">00:00:00</span>
        <div class="rec-dot"></div>
        <span style="color:red">REC</span>
    </div>
</header>

<div id="hud-tl" class="hud-box">
    SATELLITE: ARC-G19<br>
    SIGNAL: <span style="color:var(--neon-blue)">STABLE</span><br>
    LATENCY: 24ms
</div>

<div id="map"></div>

<div id="video-container">
    <video id="video" muted loop></video>
</div>

<div id="reticle">
    <div class="crosshair ch-v"></div>
    <div class="crosshair ch-h"></div>
</div>

<div id="hud-br" class="hud-box">
    STATUS: <span id="status" style="color:#fff">STANDBY</span><br>
    COORDS: <span id="coord">0.000, 0.000</span><br>
    MISSION: <span id="mode" style="color:var(--neon-blue)">SEARCH & ACQUIRE</span>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const videoSrc = "Vidshirt.mp4";
const statusTxt = document.getElementById("status");
const coordTxt = document.getElementById("coord");
const modeTxt = document.getElementById("mode");
const video = document.getElementById("video");
const videoCont = document.getElementById("video-container");

/* ================= MAP SETUP ================= */
const map = L.map('map', {
    zoomControl: false,
    dragging: false,
    scrollWheelZoom: false,
    doubleClickZoom: false
}).setView([6.92, 122.07], 7);

L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

const scanPoints = [
    {n:"SULU_SECTOR", p:[6.0, 121.0], z:10},
    {n:"ISABELA_ZONE", p:[6.70, 121.97], z:12},
    {n:"ZAMBO_HQ", p:[6.92, 122.07], z:14},
    {n:"SIBUGAY_RADAR", p:[7.78, 122.58], z:11},
    {n:"ZN_NORTH_POINT", p:[8.15, 123.00], z:10},
    {n:"ZS_SOUTH_POINT", p:[7.90, 123.40], z:10},
    {n:"FINAL_TARGET_LOCK", p:[7.7, 122.8], z:9, final:true}
];

/* ================= CORE LOGIC ================= */

function initSystem() {
    document.getElementById("overlay-msg").style.display = "none";
    startSequence();
    updateClock();
}

async function startSequence() {
    statusTxt.textContent = "SCANNING REGION";
    
    for (const pt of scanPoints) {
        statusTxt.textContent = "ACQUIRING: " + pt.n;
        coordTxt.textContent = `${pt.p[0].toFixed(4)}, ${pt.p[1].toFixed(4)}`;
        
        map.flyTo(pt.p, pt.z, { animate: true, duration: 1.5 });
        
        // Add Tactical Marker
        const marker = L.marker(pt.p).addTo(map);
        marker.bindTooltip(pt.n, { permanent: true, className: 'tactical-label', direction: 'top' }).openTooltip();
        
        // Visual Pulse
        addPulse(pt.p, pt.final ? '#ff3333' : '#00ff66');

        if (pt.final) {
            modeTxt.textContent = "LOCK CONFIRMED";
            statusTxt.style.color = "red";
            statusTxt.textContent = "ENGAGING PAYLOAD";
            await delay(2000);
            break;
        }
        await delay(1800);
    }

    launchCinematic();
}

function launchCinematic() {
    video.src = videoSrc;
    video.onloadeddata = () => {
        // Trigger Visual Shift
        document.getElementById("map").style.filter = "brightness(0.2) blur(10px) grayscale(1)";
        document.getElementById("map").style.transform = "scale(1.1)";
        
        // Show Video
        videoCont.style.opacity = "1";
        videoCont.style.transform = "scale(1)";
        video.play();
        
        modeTxt.textContent = "LIVE FEED";
        statusTxt.textContent = "STREAMING...";
        
        // Glitch effect on entry
        video.classList.add("glitch-active");
        setTimeout(() => video.classList.remove("glitch-active"), 500);
    };
}

/* ================= UTILS ================= */

function addPulse(latlng, color) {
    const c = L.circle(latlng, { radius: 20000, color: color, weight: 2, fill: false }).addTo(map);
    setTimeout(() => map.removeLayer(c), 1000);
}

function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent = now.toTimeString().split(' ')[0];
    setTimeout(updateClock, 1000);
}

function delay(ms) { return new Promise(res => setTimeout(res, ms)); }

// Manual Control
document.addEventListener("keydown", e => {
    if (e.key === " ") {
        video.paused ? video.play() : video.pause();
        statusTxt.textContent = video.paused ? "FEED PAUSED" : "STREAMING...";
    }
});
</script>

</body>
</html>
