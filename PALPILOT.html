<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | TACTICAL_PILOT</title>
    
    <link rel="icon" type="image/png" href="PIN LOGO.png">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        :root {
            --tactical-blue: #00d4ff;
            --accent-green: #00ff66;
            --bg-black: #00050a;
            --warning-red: #ff3333;
            --glass: rgba(0, 20, 40, 0.4);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: var(--bg-black); 
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-green);
        }

        /* CRT EFFECT OVERLAY */
        body::before {
            content: "";
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 3px;
            pointer-events: none; z-index: 3000; opacity: 0.3;
        }

        #tactical-header {
            position: absolute; top: 0; left: 0; width: 100%; height: 60px;
            background: linear-gradient(to bottom, var(--bg-black), transparent);
            border-bottom: 1px solid rgba(0, 212, 255, 0.3);
            display: flex; align-items: center; padding: 0 30px;
            z-index: 3100; box-sizing: border-box;
            backdrop-filter: blur(5px);
        }
        #header-logo { height: 38px; margin-right: 15px; filter: drop-shadow(0 0 8px var(--tactical-blue)); }
        #header-title { font-weight: bold; letter-spacing: 4px; font-size: 14px; color: #fff; text-shadow: 0 0 10px var(--tactical-blue); }

        #map {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; filter: brightness(0.4) contrast(1.4) saturate(0) sepia(1) hue-rotate(150deg);
            transition: all 3s ease-in-out;
        }

        /* TACTICAL VIDEO OVERLAY */
        #video-container {
            position: absolute; inset: 0;
            z-index: 1000; opacity: 0; 
            pointer-events: none;
            transition: opacity 2.5s ease-in-out;
        }
        #tactical-video {
            width: 100%; height: 100%; object-fit: cover;
            mix-blend-mode: screen; /* Renders black background transparent */
            filter: brightness(1.2) contrast(1.1);
        }

        /* HUD ELEMENTS */
        .tactical-label {
            background: rgba(0, 5, 10, 0.8) !important;
            border: 1px solid var(--accent-green) !important;
            color: var(--accent-green) !important;
            font-family: 'Courier New', monospace !important;
            font-size: 11px !important; text-transform: uppercase;
            padding: 2px 6px; box-shadow: 0 0 10px rgba(0, 255, 102, 0.3);
        }

        #reticle {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 300px; height: 300px;
            border: 1px solid rgba(0, 255, 102, 0.15);
            border-radius: 50%; z-index: 1500;
            pointer-events: none; opacity: 0;
            transition: opacity 1.5s ease;
        }
        #reticle::after { content: ""; position: absolute; inset: 45%; border: 1px solid var(--accent-green); border-radius: 50%; animation: pulse 2s infinite; }

        #hud-data {
            position: absolute; bottom: 30px; right: 30px; z-index: 3500;
            font-size: 12px; text-align: right; line-height: 1.8;
            pointer-events: none; text-shadow: 0 0 5px var(--accent-green);
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(3); opacity: 0; } }
    </style>
</head>
<body oncontextmenu="return false;">

    <header id="tactical-header">
        <img src="PIN LOGO.png" id="header-logo" alt="PRO9">
        <div id="header-title">PRO9 | TACTICAL_INTERCEPT</div>
    </header>

    <div id="map"></div>

    <div id="video-container">
        <video id="tactical-video" autoplay muted loop playsinline>
            <source src="Vidshirt.mp4" type="video/mp4">
        </video>
    </div>

    <div id="reticle"></div>
    
    <div id="hud-data">
        <span style="color:var(--tactical-blue)">// SECURE_FEED_STABLE //</span><br>
        STATUS: <span id="status-text" style="color:#fff">BOOTING...</span><br>
        COORD: <span id="current-coord" style="color:#fff">---</span><br>
        MODE: <span id="alert-status" style="color:#fff">IDLE</span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const pinIcon = L.icon({
            iconUrl: 'PIN LOGO.png',
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        const scanPoints = [
            {n: "SULU_ARCHIPELAGO", p: [6.0, 121.0], z: 10},
            {n: "ISABELA_SECTOR", p: [6.70, 121.97], z: 12},
            {n: "ZAMBOANGA_HQ", p: [6.92, 122.07], z: 14},
            {n: "SIBUGAY_DISTRICT", p: [7.78, 122.58], z: 11},
            {n: "ZN_PROVINCE", p: [8.15, 123.00], z: 10},
            {n: "ZS_PROVINCE", p: [7.90, 123.40], z: 10},
            {n: "ZAMPEN_FINAL_LOCK", p: [7.7, 122.8], z: 9}
        ];

        const map = L.map('map', { 
            zoomControl: false, attributionControl: false,
            dragging: false, scrollWheelZoom: false
        }).setView(scanPoints[0].p, 8);

        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

        const statusText = document.getElementById('status-text');
        const hudCoord = document.getElementById('current-coord');
        const alertStatus = document.getElementById('alert-status');
        const reticle = document.getElementById('reticle');
        const videoContainer = document.getElementById('video-container');

        async function runTacticalSequence() {
            await new Promise(r => setTimeout(r, 1500));
            reticle.style.opacity = "1";
            
            for (const point of scanPoints) {
                statusText.innerText = `SCANNING_${point.n}`;
                hudCoord.innerText = `${point.p[0].toFixed(4)}N / ${point.p[1].toFixed(4)}E`;
                
                map.flyTo(point.p, point.z, { duration: 1.5 });
                
                L.marker(point.p, { icon: pinIcon })
                    .addTo(map)
                    .bindTooltip(point.n, {
                        permanent: true, direction: 'top', className: 'tactical-label', offset: [0, -10]
                    });

                await new Promise(r => setTimeout(r, 2000));
            }
            
            completeLock();
        }

        function completeLock() {
            alertStatus.innerText = "LOCKED";
            alertStatus.style.color = "var(--accent-green)";
            statusText.innerText = "STREAM_ACTIVE";
            
            // SHOW VIDEO OVERLAY
            videoContainer.style.opacity = "1";
            
            // MAKE MAP SEMI-VISIBLE (Dark High-Contrast Mode)
            document.getElementById('map').style.filter = "brightness(0.15) contrast(2) grayscale(1) sepia(1) hue-rotate(160deg)";
        }

        window.onload = runTacticalSequence;
    </script>
</body>
</html>
