<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PRO9 | TACTICAL_CORE</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --neon-blue: #00d4ff;
            --neon-green: #00ff66;
            --hazard-red: #ff3333;
            --bg-black: #00080a;
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            overflow: hidden; background-color: #000; 
            font-family: 'Courier New', monospace;
            color: var(--neon-green);
        }

        /* TACTICAL GRID & CRT EFFECT */
        body::after {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%),
                        radial-gradient(circle, transparent 20%, rgba(0,0,0,0.8) 100%);
            background-size: 100% 4px, 100% 100%;
            pointer-events: none; z-index: 1000;
        }

        #map {
            position: absolute; inset: 0; z-index: 1;
            filter: brightness(0.2) contrast(1.5) saturate(0) sepia(1) hue-rotate(155deg);
            transition: filter 2s ease;
        }

        /* THE VIDEO HUD (TRANSPARENT) */
        #video-hud {
            position: absolute; inset: 0; z-index: 500;
            opacity: 0; pointer-events: none;
            transition: opacity 2s ease-in-out;
        }
        video {
            width: 100%; height: 100%; object-fit: cover;
            mix-blend-mode: screen; filter: brightness(1.2) contrast(1.1);
        }

        /* DATA OVERLAY */
        .hud-element {
            position: absolute; z-index: 1100; pointer-events: none;
            text-transform: uppercase; font-size: 12px; font-weight: bold;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        header { top: 20px; left: 30px; border-left: 3px solid var(--neon-blue); padding-left: 15px; }
        footer { bottom: 30px; right: 30px; text-align: right; border-right: 3px solid var(--neon-green); padding-right: 15px; }

        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 200px; height: 200px; border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 50%; z-index: 600; opacity: 0; transition: 1s;
        }
        #reticle::before { content: ""; position: absolute; width: 1px; height: 300px; left: 50%; top: -50px; background: rgba(0,255,102,0.2); }
        #reticle::after { content: ""; position: absolute; height: 1px; width: 300px; top: 50%; left: -50px; background: rgba(0,255,102,0.2); }

        .blink { animation: pulse 0.8s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
    </style>
</head>
<body>

<div id="map"></div>

<header class="hud-element">
    <div style="font-size: 18px; letter-spacing: 4px;">PRO9 // INTERCEPT</div>
    <div id="status-line" style="color: var(--neon-blue);">SATELLITE_LINK: ESTABLISHING...</div>
</header>

<div id="video-hud">
    <video autoplay muted loop playsinline>
        <source src="Vidshirt.mp4" type="video/mp4">
    </video>
</div>

<div id="reticle"></div>

<footer class="hud-element">
    <div class="blink" id="alert-tag">-- SCANNING SECTORS --</div>
    <div id="coord-hud" style="color: #fff;">0.0000 / 0.0000</div>
    <div style="font-size: 9px; opacity: 0.6;">TEMP: 32°C | BATT: 94% | V-SYNC: ON</div>
</footer>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const scanPoints = [
        {n: "SULU_ARCHIPELAGO", p: [6.0, 121.0], z: 10},
        {n: "ISABELA_SECTOR", p: [6.70, 121.97], z: 12},
        {n: "ZAMBOANGA_HQ", p: [6.92, 122.07], z: 14},
        {n: "SIBUGAY_DISTRICT", p: [7.78, 122.58], z: 11},
        {n: "ZN_PROVINCE", p: [8.15, 123.00], z: 10},
        {n: "ZS_PROVINCE", p: [7.90, 123.40], z: 10},
        {n: "ZAMPEN_FINAL_LOCK", p: [7.7, 122.8], z: 8}
    ];

    const map = L.map('map', { zoomControl:false, dragging:false, scrollWheelZoom:false }).setView(scanPoints[0].p, 8);
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

    async function startMission() {
        const status = document.getElementById('status-line');
        const coords = document.getElementById('coord-hud');
        const alertTag = document.getElementById('alert-tag');
        const reticle = document.getElementById('reticle');

        await new Promise(r => setTimeout(r, 1500));
        reticle.style.opacity = "1";

        for (const pt of scanPoints) {
            status.innerText = `TARGET_ACQUIRED: ${pt.n}`;
            coords.innerText = `${pt.p[0].toFixed(4)}N / ${pt.p[1].toFixed(4)}E`;
            
            map.flyTo(pt.p, pt.z, { duration: 1.5, easeLinearity: 0.1 });
            
            // Add a small tactical pulse circle on the map
            L.circleMarker(pt.p, { radius: 10, color: '#00ff66', weight: 1, opacity: 0.5 }).addTo(map);

            if(pt.n === "ZAMPEN_FINAL_LOCK") {
                status.style.color = "#ff3333";
                alertTag.innerText = "!! TERMINAL LOCK !!";
                alertTag.style.color = "#ff3333";
            }
            await new Promise(r => setTimeout(r, 2200));
        }

        // Deploy Holographic HUD
        document.getElementById('video-hud').style.opacity = "1";
        document.getElementById('map').style.filter = "brightness(0.05) blur(10px) grayscale(1)";
        status.innerText = "STREAM_LIVE: ENCRYPTED";
        status.style.color = "var(--neon-green)";
    }

    window.onload = startMission;
</script>
</body>
</html>
